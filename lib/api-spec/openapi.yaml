        id:
          type: integer
        name:
          type: string
        description:
          type: string
        pathwayCategory:
          type: string
        activeLearners:
          type: integer
        completionRate:
          type: integer
        readinessScore:
          type: integer
        eventParticipation:
          type: integer
        placementReady:
          type: integer
        funderTag:
          type: string
        cohort:
          type: string
        startDate:
          type: string
        endDate:
          type: string
        pathways:
          type: array
          items:
            type: string
          nullable: true
      required:
        - id
        - name
        - description
        - pathwayCategory
        - activeLearners
        - completionRate
        - readinessScore
        - eventParticipation
        - placementReady
        - funderTag
        - cohort
        - startDate
        - endDate

    CreateProgram:
      type: object
