version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm install -g pnpm@9
        - pnpm install --no-frozen-lockfile
    build:
      commands:
        # Build the Lambda bundle for the API
        - cd artifacts/api-server && node ./build.mjs --lambda
        # Build the frontend
        - pnpm --filter @workspace/riisemap build
  artifacts:
    baseDirectory: artifacts/riisemap/dist/public
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
