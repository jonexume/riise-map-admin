version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm install -g pnpm@9
        - pnpm install --no-frozen-lockfile
    build:
      commands:
        - pnpm --filter @workspace/riisemap build
  artifacts:
    baseDirectory: artifacts/riisemap/dist/public
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*