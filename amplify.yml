version: 1
backend:
  phases:
    build:
      commands:
        - npm install -g pnpm@9
        - pnpm install --no-frozen-lockfile
        - pnpm --filter @workspace/api-server build
  artifacts:
    baseDirectory: artifacts/api-server
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
  start:
    command: node dist/index.js
frontend:
  phases:
    preBuild:
      commands:
        - npm install -g pnpm@9
        - pnpm install --no-frozen-lockfile
    build:
      commands:
        - pnpm --filter @workspace/riisemap build
  artifacts:
    baseDirectory: artifacts/riisemap/dist/public
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*