name: Deploy API

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - uses: aws-actions/setup-sam@v2

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - run: npm install -g pnpm@9 && pnpm install --no-frozen-lockfile

      - run: pnpm run build:lambda

      - run: |
          sam deploy \
            --stack-name riisemap-api \
            --parameter-overrides \
              "DatabaseUrl=${{ secrets.DATABASE_URL }}" \
              "AuthProvider=${{ secrets.AUTH_PROVIDER }}" \
              "CognitoUserPoolId=${{ secrets.COGNITO_USER_POOL_ID }}" \
              "CognitoClientId=${{ secrets.COGNITO_CLIENT_ID }}" \
              "Stage=prod" \
            --capabilities CAPABILITY_IAM \
            --resolve-s3 \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset
